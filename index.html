        function backToPlayer() {
            if (isPlaying) {
                stopPlayback();
            }
            isViewOnlyMode = false;
            showView('player');
            renderSubsectionPlayerList();
        }

        function togglePlay() {
            initAudio();
            const playBtn = document.getElementById('playBtn');

            if (isPlaying) {
                stopPlay();
            } else {
                startPlay();
            }
        }

        function startPlay() {
            isPlaying = true;
            const playBtn = document.getElementById('playBtn');
            playBtn.textContent = '⏸';
            playBtn.classList.add('playing');

            // Play the recorded pattern or default beat
            playLoop();
        }

        function stopPlay() {
            isPlaying = false;
            const playBtn = document.getElementById('playBtn');
            playBtn.textContent = '▶';
            playBtn.classList.remove('playing');

            // Clear all active timeouts to prevent overlapping
            activeTimeouts.forEach(timeoutId => clearTimeout(timeoutId));
            activeTimeouts = [];
        }

        function playLoop() {
            if (!isPlaying) return;

            const songData = savedPatterns[currentSong.id];
            const subsectionData = currentSubsection ? songData?.subsections?.[currentSubsection] : null;
            const hasPatterns = subsectionData && subsectionData.measures && subsectionData.patterns && Object.keys(subsectionData.patterns).length > 0;

            if (hasPatterns) {
                const totalSteps = subsectionData.measures * 16; // sixteenth notes (16 per measure)
                const stepDuration = (60000 / currentBPM) / 4; // BPM to 16th note duration

                // Play click track on quarter notes if enabled
                if (activePlaybackInstruments.has('click')) {
                    for (let i = 0; i < totalSteps; i += 4) {
                        const timeoutId = setTimeout(() => {
                            if (isPlaying) createClickSound(1500, 0.03, 0.12);
                        }, i * stepDuration);
                        activeTimeouts.push(timeoutId);
                    }
                }

                // Play instrument patterns (only if enabled)
                instruments.forEach(instrument => {
                    if (activePlaybackInstruments.has(instrument.id)) {
                        const pattern = subsectionData.patterns[instrument.id];
                        if (pattern) {
                            pattern.forEach((beat) => {
                                const timeoutId = setTimeout(() => {
                                    if (isPlaying) {
                                        const volume = beat.accent ? 0.7 : 0.3;
                                        createClickSound(instrument.frequency, 0.05, volume);
                                    }
                                }, beat.step * stepDuration);
                                activeTimeouts.push(timeoutId);
                            });
                        }
                    }
                });

                const loopTimeoutId = setTimeout(() => {
                    if (isPlaying) playLoop();
                }, totalSteps * stepDuration);
                activeTimeouts.push(loopTimeoutId);
            } else {
                // Play default simple beat with click
                const interval = 500;
                for (let i = 0; i < 4; i++) {
                    const timeoutId = setTimeout(() => {
                        if (isPlaying) {
                            createClickSound(1500, 0.03, 0.12); // Quiet click track
                            if (i === 0) createClickSound(800, 0.05, 0.3); // Accent first beat
                        }
                    }, i * interval);
                    activeTimeouts.push(timeoutId);
                }
                const loopTimeoutId = setTimeout(() => {
                    if (isPlaying) playLoop();
                }, 2000);
                activeTimeouts.push(loopTimeoutId);
            }
        }

        function showEditor() {
            if (!isAuthenticated) {
                alert('Please log in to edit beat patterns');
                return;
            }

            // Stop any playing audio
            if (isPlaying) {
                stopSubsectionPlay();
            }

            document.getElementById('editorSongTitle').textContent = currentSong.name;
            showView('editor');
            updateAuthUI();

            const songData = savedPatterns[currentSong.id];
            const hasSubsections = songData && songData.subsections && Object.keys(songData.subsections).length > 0;

            if (hasSubsections) {
                // Show subsection manager
                document.getElementById('subsectionManager').style.display = 'block';
                document.getElementById('beatSetup').style.display = 'none';
                document.getElementById('gridEditor').style.display = 'none';
                renderSubsectionList();
            } else {
                // First time - show subsection manager
                document.getElementById('subsectionManager').style.display = 'block';
                document.getElementById('beatSetup').style.display = 'none';
                document.getElementById('gridEditor').style.display = 'none';
                renderSubsectionList();
            }
        }

        function renderSubsectionList() {
            const list = document.getElementById('subsectionList');
            list.innerHTML = '';

            const songData = savedPatterns[currentSong.id];
            if (songData && songData.subsections) {
                Object.keys(songData.subsections).forEach(subsectionName => {
                    const item = document.createElement('div');
                    item.className = 'subsection-item';
                    if (currentSubsection === subsectionName) {
                        item.classList.add('selected');
                    }

                    const nameSpan = document.createElement('span');
                    nameSpan.textContent = subsectionName;
                    nameSpan.onclick = () => selectSubsection(subsectionName);

                    item.appendChild(nameSpan);

                    // Only show delete button if authenticated
                    if (isAuthenticated) {
                        const deleteBtn = document.createElement('button');
                        deleteBtn.textContent = 'Delete';
                        deleteBtn.onclick = (e) => {
                            e.stopPropagation();
                            deleteSubsection(subsectionName);
                        };
                        item.appendChild(deleteBtn);
                    }

                    list.appendChild(item);
                });
            }

            if (list.children.length === 0) {
                const emptyMsg = document.createElement('div');
                emptyMsg.style.textAlign = 'center';
                emptyMsg.style.color = '#666';
                emptyMsg.style.padding = '20px';
                emptyMsg.textContent = 'No subsections yet. Add one below!';
                list.appendChild(emptyMsg);
            }
        }

        function addSubsection() {
            if (!isAuthenticated) {
                alert('Please log in to add subsections');
                return;
            }

            const input = document.getElementById('newSubsectionName');
            const name = input.value.trim();

            if (!name) {
                alert('Please enter a subsection name');
                return;
            }

            const songData = savedPatterns[currentSong.id];
            if (songData.subsections[name]) {
                alert('A subsection with that name already exists');
                return;
            }

            currentSubsection = name;
            document.getElementById('subsectionManager').style.display = 'none';
            document.getElementById('beatSetup').style.display = 'block';
            document.getElementById('gridEditor').style.display = 'none';
            input.value = '';
            saveToStorage();
        }

        function selectSubsection(name) {
            if (!isAuthenticated) {
                alert('Please log in to edit subsections');
                return;
            }

            isViewOnlyMode = false;
            currentSubsection = name;
            const subsectionData = savedPatterns[currentSong.id].subsections[name];

            document.getElementById('subsectionManager').style.display = 'none';
            document.getElementById('beatSetup').style.display = 'none';
            document.getElementById('gridEditor').style.display = 'block';
            document.getElementById('currentSubsectionName').textContent = name;

            // Show edit controls, hide view controls
            document.getElementById('instrumentButtons').style.display = 'flex';
            document.querySelector('.tap-record-container').style.display = 'flex';
            document.getElementById('editControls').style.display = 'flex';
            document.getElementById('viewControls').style.display = 'none';

            // Update tap area text and reset recording state
            const tapArea = document.getElementById('tapRecordArea');
            const recordToggleBtn = document.getElementById('recordToggleBtn');
            const recordIcon = document.getElementById('recordIcon');
            const stopIcon = document.getElementById('stopIcon');
            tapArea.classList.remove('recording', 'countdown');
            recordToggleBtn.classList.remove('recording', 'countdown');
            document.getElementById('tapAreaText').textContent = 'Select instrument & tap here';
            document.getElementById('recordStatus').classList.remove('active');
            recordIcon.style.display = 'block';
            stopIcon.style.display = 'none';
            isRecording = false;

            gridMeasures = subsectionData.measures;
            gridCols = 16;
            totalCells = gridMeasures * gridCols;

            // Use song-level BPM
            currentBPM = savedPatterns[currentSong.id].bpm || 120;
            const bpmInput = document.getElementById('bpmInput');
            bpmInput.value = currentBPM;
            bpmInput.readOnly = !isAuthenticated;

            // Show/hide BPM control buttons based on auth
            const editorBpmControl = document.getElementById('editorBpmControl');
            if (editorBpmControl) {
                const buttons = editorBpmControl.querySelectorAll('button');
                buttons.forEach(btn => btn.classList.toggle('hidden', !isAuthenticated));
            }

            // Reset and initialize playback instruments for this subsection
            activePlaybackInstruments.clear();
            initializePlaybackInstruments();
            renderInstrumentButtons();
            renderPlaybackToggles();
            renderGrid();
            updateClearButton();

            // Always auto-start playback
            startPlayback();
        }

        function deleteSubsection(name) {
            if (!isAuthenticated) {
                alert('Please log in to delete subsections');
                return;
            }

            if (!confirm(`Delete "${name}"?`)) return;

            delete savedPatterns[currentSong.id].subsections[name];
            if (currentSubsection === name) {
                currentSubsection = null;
            }
            renderSubsectionList();
            saveToStorage();
        }



        function togglePlayback() {
            if (isPlayingPreview) {
                stopPlayback();
            } else {
                startPlayback();
            }
        }

        function togglePlayback() {
            if (isPlaying) {
                stopPlayback();
            } else {
                startPlayback();
            }
        }

        function startPlayback() {
            initAudio();
            isPlaying = true;

            const playBtn = isViewOnlyMode ? document.getElementById('viewPlaybackBtn') : document.getElementById('playbackBtn');
            if (playBtn) {
                playBtn.textContent = 'Stop';
            }

            playGridLoop();
        }

        function stopPlayback() {
            isPlaying = false;

            const playBtn = isViewOnlyMode ? document.getElementById('viewPlaybackBtn') : document.getElementById('playbackBtn');
            if (playBtn) {
                playBtn.textContent = 'Play';
            }

            // Clear visual indicators
            currentBeatIndex = -1;
            lastPlayedBeatIndex = -1;
            updateBeatHighlights();

            if (playbackInterval) {
                clearInterval(playbackInterval);
                playbackInterval = null;
            }

            // Stop recording if active
            if (isRecording) {
                stopRecording();
            }
        }

        function playGridLoop() {
            if (!isPlaying) return;

            // Clear any existing interval first
            if (playbackInterval) {
                clearInterval(playbackInterval);
            }

            const subsectionData = savedPatterns[currentSong.id].subsections[currentSubsection];
            const totalSteps = totalCells;
            const stepDuration = (60000 / currentBPM) / 4; // BPM to 16th note duration

            currentBeatIndex = 0;

            playbackInterval = setInterval(() => {
                if (!isPlaying) {
                    clearInterval(playbackInterval);
                    playbackInterval = null;
                    return;
                }

                // Track which beat is currently playing (before incrementing)
                lastPlayedBeatIndex = currentBeatIndex;

                // Play click track on quarter notes (every 4th sixteenth note) if enabled
                if (activePlaybackInstruments.has('click') && currentBeatIndex % 4 === 0) {
                    createClickSound(1500, 0.03, 0.12); // Quiet click track
                }

                // Play instrument sounds for this step (only if enabled)
                instruments.forEach(instrument => {
                    if (activePlaybackInstruments.has(instrument.id)) {
                        const pattern = subsectionData.patterns[instrument.id];
                        if (pattern) {
                            const beat = pattern.find(b => b.step === currentBeatIndex);
                            if (beat) {
                                const volume = beat.accent ? 0.7 : 0.3; // Accented beats much louder
                                createClickSound(instrument.frequency, 0.05, volume);
                            }
                        }
                    }
                });

                updateBeatHighlights();

                // Increment at the end, so lastPlayedBeatIndex stays stable during the step
                currentBeatIndex = (currentBeatIndex + 1) % totalSteps;
            }, stepDuration);
        }

        function updateBeatHighlights() {
            const cells = document.querySelectorAll('.beat-cell');
            cells.forEach(cell => {
                const step = parseInt(cell.dataset.step);
                if (step === currentBeatIndex) {
                    cell.classList.add('playing');
                } else {
                    cell.classList.remove('playing');
                }
            });
        }

        function stopPlay() {
            isPlaying = false;

            // Clear all active timeouts to prevent overlapping
            activeTimeouts.forEach(timeoutId => clearTimeout(timeoutId));
            activeTimeouts = [];

            if (playbackInterval) {
                clearInterval(playbackInterval);
                playbackInterval = null;
            }

            currentBeatIndex = -1;
        }

        function adjustBPM(delta) {
            if (!isAuthenticated) {
                alert('Please log in to change BPM');
                return;
            }

            const input = document.getElementById('bpmInput');
            let newBPM = parseInt(input.value) + delta;
            newBPM = Math.max(40, Math.min(240, newBPM));
            input.value = newBPM;
            updateBPM();
        }

        function adjustSongBPM(delta) {
            if (!isAuthenticated) {
                alert('Please log in to change BPM');
                return;
            }

            const input = document.getElementById('songBpmInput');
            let newBPM = parseInt(input.value) + delta;
            newBPM = Math.max(40, Math.min(240, newBPM));
            input.value = newBPM;
            updateSongBPM();
        }

        function updateSongBPM() {
            if (!isAuthenticated) {
                alert('Please log in to change BPM');
                // Reset to saved value
                const savedBPM = savedPatterns[currentSong.id].bpm || 120;
                document.getElementById('songBpmInput').value = savedBPM;
                return;
            }

            const input = document.getElementById('songBpmInput');
            let newBPM = parseInt(input.value);

            if (isNaN(newBPM) || newBPM < 40) {
                newBPM = 40;
            } else if (newBPM > 240) {
                newBPM = 240;
            }

            input.value = newBPM;

            // Save to song data
            savedPatterns[currentSong.id].bpm = newBPM;
            saveToStorage();

            // Update current BPM for any playing subsection
            currentBPM = newBPM;

            // Restart playback if currently playing to apply new BPM
            if (isPlaying) {
                stopSubsectionPlay();
                // Restart the playing subsection if there is one
                if (playingSubsection) {
                    setTimeout(() => playSubsection(playingSubsection), 100);
                }
            }
        }

        function updateBPM() {
            if (!isAuthenticated) {
                alert('Please log in to change BPM');
                // Reset to saved value
                const savedBPM = savedPatterns[currentSong.id].bpm || 120;
                document.getElementById('bpmInput').value = savedBPM;
                return;
            }

            const input = document.getElementById('bpmInput');
            let newBPM = parseInt(input.value);

            if (isNaN(newBPM) || newBPM < 40) {
                newBPM = 40;
            } else if (newBPM > 240) {
                newBPM = 240;
            }

            input.value = newBPM;
            currentBPM = newBPM;

            // Save to song level so it persists
            savedPatterns[currentSong.id].bpm = newBPM;
            saveToStorage();

            // Restart playback if currently playing to apply new BPM
            if (isPlaying) {
                stopPlayback();
                startPlayback();
            }
        }

        function backToSubsections() {
            if (isPlaying) {
                stopPlayback();
            }
            if (isRecording) {
                toggleRecord();
            }

            document.getElementById('subsectionManager').style.display = 'block';
            document.getElementById('beatSetup').style.display = 'none';
            document.getElementById('gridEditor').style.display = 'none';
            renderSubsectionList();
        }
    </script>
</body>
</html>
