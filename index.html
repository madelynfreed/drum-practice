<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drum Practice</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a1a;
            color: #fff;
            min-height: 100vh;
            margin: 0;
            touch-action: manipulation;
        }

        .view {
            display: none;
            min-height: 100vh;
            flex-direction: column;
        }

        .view.active {
            display: flex;
        }

        header {
            background: #2a2a2a;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .back-btn {
            background: none;
            border: none;
            color: #4a9eff;
            font-size: 16px;
            cursor: pointer;
            padding: 8px;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .spacer {
            width: 60px;
        }

        .song-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .song-item {
            background: #2a2a2a;
            padding: 20px;
            margin-bottom: 12px;
            border-radius: 12px;
            transition: background 0.2s;
        }

        .song-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .song-item-name {
            cursor: pointer;
            flex: 1;
            font-size: 18px;
            font-weight: 600;
        }

        .song-item-name:hover {
            color: #4a9eff;
        }

        .song-item-delete {
            padding: 6px 14px;
            background: #ff4a4a;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .song-item-delete:active {
            background: #e03a3a;
        }

        .subsection-list {
            padding-left: 20px;
            margin-top: 8px;
        }

        .subsection-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #1a1a1a;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .subsection-list-item:last-child {
            margin-bottom: 0;
        }

        .subsection-list-name {
            flex: 1;
            color: #ccc;
        }

        .subsection-play-btn {
            padding: 6px 16px;
            background: #4a9eff;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .subsection-play-btn:active {
            background: #3a8eef;
        }

        .subsection-play-btn.playing {
            background: #ff4a4a;
        }

        .add-song-section {
            background: #2a2a2a;
            padding: 16px;
            margin-bottom: 16px;
            border-radius: 12px;
        }

        .login-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .login-box {
            background: #2a2a2a;
            padding: 32px;
            border-radius: 12px;
            max-width: 400px;
            width: 100%;
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
        }

        .login-input {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 2px solid #4a9eff;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 16px;
        }

        .login-submit-btn {
            width: 100%;
            padding: 12px;
            background: #4aff4a;
            border: none;
            color: #1a1a1a;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 12px;
        }

        .login-submit-btn:active {
            background: #3ae03a;
        }

        .login-cancel-btn {
            width: 100%;
            padding: 12px;
            background: #3a3a3a;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
        }

        .login-cancel-btn:active {
            background: #4a4a4a;
        }

        .login-error {
            color: #ff4a4a;
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
        }

        .auth-btn {
            background: none;
            border: none;
            color: #4a9eff;
            font-size: 14px;
            cursor: pointer;
            padding: 8px;
            font-weight: 600;
        }

        .auth-btn.logout {
            color: #ff6347;
        }

        .auth-btn:hover {
            opacity: 0.8;
        }

        .hidden {
            display: none !important;
        }

        .add-song-input {
            display: flex;
            gap: 8px;
        }

        .add-song-input input {
            flex: 1;
            padding: 12px;
            background: #1a1a1a;
            border: 2px solid #4a9eff;
            color: white;
            border-radius: 8px;
            font-size: 16px;
        }

        .add-song-input button {
            padding: 12px 24px;
            background: #4aff4a;
            border: none;
            color: #1a1a1a;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
        }

        .add-song-input button:active {
            background: #3ae03a;
        }

        .player-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            overflow-y: auto;
        }

        .song-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
        }

        .subsection-player-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .subsection-player-item {
            background: #2a2a2a;
            padding: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .subsection-player-name {
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
        }

        .subsection-player-name:hover {
            color: #4a9eff;
        }

        .subsection-player-controls {
            display: flex;
            gap: 8px;
        }

        .play-subsection-btn {
            padding: 10px 20px;
            background: #4a9eff;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .play-subsection-btn:active {
            transform: scale(0.95);
        }

        .play-subsection-btn.playing {
            background: #ff4a4a;
        }

        .no-subsections {
            text-align: center;
            color: #666;
            padding: 40px 20px;
            font-size: 16px;
        }

        .song-bpm-control {
            background: #2a2a2a;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
        }

        .song-bpm-control label {
            font-size: 14px;
            font-weight: 600;
        }

        .song-bpm-control input {
            width: 70px;
            padding: 8px;
            font-size: 16px;
            text-align: center;
            background: #1a1a1a;
            border: 2px solid #4a9eff;
            color: white;
            border-radius: 6px;
        }

        .song-bpm-control button {
            padding: 8px 16px;
            background: #3a3a3a;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        .song-bpm-control button:active {
            background: #4a4a4a;
        }

        .action-btn {
            background: #2a2a2a;
            border: none;
            color: #4a9eff;
            padding: 16px 32px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 8px;
        }

        .action-btn:active {
            background: #3a3a3a;
        }

        .editor-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            overflow-y: auto;
        }

        .subsection-manager {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .subsection-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        .subsection-item {
            background: #1a1a1a;
            padding: 12px 16px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .subsection-item:hover {
            background: #252525;
        }

        .subsection-item.selected {
            background: #4a9eff;
            font-weight: 600;
        }

        .subsection-item button {
            padding: 4px 12px;
            background: #ff4a4a;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .add-subsection {
            display: flex;
            gap: 8px;
        }

        .add-subsection input {
            flex: 1;
            padding: 10px;
            background: #1a1a1a;
            border: 2px solid #4a9eff;
            color: white;
            border-radius: 6px;
            font-size: 14px;
        }

        .add-subsection button {
            padding: 10px 20px;
            background: #4aff4a;
            border: none;
            color: #1a1a1a;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .beat-setup {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 16px;
            text-align: center;
        }

        .beat-setup label {
            display: block;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .beat-setup input {
            width: 80px;
            padding: 12px;
            font-size: 20px;
            text-align: center;
            background: #1a1a1a;
            border: 2px solid #4a9eff;
            color: white;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .beat-setup button {
            padding: 12px 32px;
            font-size: 16px;
        }

        .current-subsection {
            text-align: center;
            padding: 8px;
            background: #1a1a1a;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 14px;
            color: #4a9eff;
            font-weight: 600;
        }

        .grid-container {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .beat-grid {
            display: grid;
            gap: 4px;
            width: fit-content;
        }

        .beat-cell {
            aspect-ratio: 1;
            min-height: 60px;
            background: #1a1a1a;
            border: 2px solid #3a3a3a;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.1s;
            position: relative;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 3px;
            padding: 4px;
        }

        .beat-cell:active {
            transform: scale(0.95);
        }

        .beat-cell.quarter-start {
            border-left-width: 3px;
            border-left-color: #666;
        }

        .beat-cell.playing {
            box-shadow: inset 0 0 0 3px #4aff4a;
        }

        .instrument-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
            position: relative;
        }

        .instrument-dot.accent {
            width: 16px;
            height: 16px;
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.8);
        }

        .instrument-dot.surdo1 {
            background: #8B4513;
        }

        .instrument-dot.surdo2 {
            background: #CD853F;
        }

        .instrument-dot.dobra {
            background: #FFD700;
        }

        .instrument-dot.repi {
            background: #FF6347;
        }

        .instrument-dot.snare {
            background: #4169E1;
        }


        .status-text {
            text-align: center;
            color: #666;
            margin-bottom: 8px;
            font-size: 14px;
        }

        /* Mobile responsive styles */
        @media (max-width: 768px) {
            .song-title {
                font-size: 22px;
                margin-bottom: 16px;
            }

            .beat-cell {
                min-height: 30px;
                padding: 1px;
            }

            .instrument-dot {
                width: 8px;
                height: 8px;
            }

            .instrument-dot.accent {
                width: 11px;
                height: 11px;
            }

            .grid-container {
                padding: 8px;
            }

            .beat-grid {
                gap: 2px;
            }

            .instrument-buttons {
                gap: 6px;
            }

            .instrument-btn {
                padding: 10px 14px;
                font-size: 13px;
            }

            .playback-toggle-btn {
                padding: 6px 10px;
                font-size: 11px;
            }

            .bpm-control, .song-bpm-control {
                flex-wrap: wrap;
                padding: 10px 12px;
                gap: 8px;
            }

            .bpm-control input, .song-bpm-control input {
                width: 60px;
                padding: 6px;
                font-size: 14px;
            }

            .bpm-control button, .song-bpm-control button {
                padding: 6px 12px;
                font-size: 14px;
            }

            .controls-row {
                flex-wrap: wrap;
            }

            .controls-row button {
                flex: 1 1 45%;
                min-width: 120px;
                padding: 12px 8px;
                font-size: 14px;
            }

            .tap-record-area {
                min-height: 100px;
                font-size: 24px;
            }


            .subsection-item {
                padding: 14px;
                font-size: 16px;
            }

            .subsection-player-item {
                padding: 14px;
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }

            .subsection-player-name {
                font-size: 16px;
                text-align: center;
            }

            .subsection-player-controls {
                justify-content: center;
            }

            .play-subsection-btn {
                flex: 1;
                padding: 12px 16px;
            }

            .beat-setup input {
                width: 70px;
                padding: 10px;
                font-size: 18px;
            }

            .add-subsection {
                flex-direction: column;
            }

            .add-subsection input {
                width: 100%;
            }

            .add-subsection button {
                width: 100%;
                padding: 12px;
            }

            .add-song-input {
                flex-direction: column;
            }

            .add-song-input input {
                width: 100%;
            }

            .add-song-input button {
                width: 100%;
                padding: 12px;
            }

            .song-item {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
                padding: 14px;
            }

            .song-item-name {
                text-align: center;
                font-size: 16px;
            }

            .song-item-delete {
                width: 100%;
                padding: 10px;
            }

            .subsection-list-item {
                flex-direction: column;
                align-items: stretch;
                gap: 6px;
            }

            .subsection-play-btn {
                width: 100%;
            }

            header {
                padding: 12px;
            }

            h1 {
                font-size: 18px;
            }

            .back-btn {
                font-size: 14px;
                padding: 6px;
            }
        }

        @media (max-width: 480px) {
            .beat-cell {
                min-height: 24px;
                padding: 1px;
            }

            .instrument-dot {
                width: 6px;
                height: 6px;
            }

            .instrument-dot.accent {
                width: 9px;
                height: 9px;
            }

            .grid-container {
                padding: 6px;
            }

            .beat-grid {
                gap: 1px;
            }

            .song-title {
                font-size: 20px;
            }

            .instrument-btn {
                padding: 8px 10px;
                font-size: 12px;
            }

            .playback-toggle-btn {
                padding: 5px 8px;
                font-size: 10px;
            }

            .current-subsection {
                font-size: 13px;
                padding: 6px;
            }
        }

        /* Landscape mode - make grid smaller to fit on screen */
        @media (max-height: 500px) and (orientation: landscape) {
            .beat-cell {
                min-height: 18px;
                padding: 1px;
            }

            .instrument-dot {
                width: 5px;
                height: 5px;
            }

            .instrument-dot.accent {
                width: 7px;
                height: 7px;
            }

            .grid-container {
                padding: 4px;
            }

            .beat-grid {
                gap: 1px;
            }

            .current-subsection {
                font-size: 12px;
                padding: 4px;
                margin-bottom: 8px;
            }

            .instrument-buttons {
                gap: 4px;
                margin-bottom: 8px;
            }

            .instrument-btn {
                padding: 6px 8px;
                font-size: 11px;
            }

            .playback-toggles {
                padding: 6px 8px;
                margin-bottom: 8px;
            }

            .playback-toggle-btn {
                padding: 4px 6px;
                font-size: 9px;
            }

            .bpm-control {
                padding: 6px 8px;
                margin-bottom: 8px;
                gap: 6px;
            }

            .bpm-control input {
                width: 50px;
                padding: 4px;
                font-size: 12px;
            }

            .bpm-control button {
                padding: 4px 8px;
                font-size: 12px;
            }

            .tap-record-area {
                min-height: 60px;
                font-size: 20px;
                margin-bottom: 8px;
            }

            header {
                padding: 8px;
            }

            h1 {
                font-size: 16px;
            }
        }

        .instrument-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .instrument-btn {
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 3px solid transparent;
            font-size: 14px;
            background: #2a2a2a;
            color: white;
        }

        .instrument-btn:active {
            transform: scale(0.95);
        }

        .instrument-btn.selected {
            border-color: white;
            transform: scale(1.1);
        }

        .instrument-btn.surdo1 {
            color: #8B4513;
        }

        .instrument-btn.surdo1.selected {
            background: #8B4513;
            color: white;
        }

        .instrument-btn.surdo2 {
            color: #CD853F;
        }

        .instrument-btn.surdo2.selected {
            background: #CD853F;
            color: white;
        }

        .instrument-btn.dobra {
            color: #FFD700;
        }

        .instrument-btn.dobra.selected {
            background: #FFD700;
            color: #000;
        }

        .instrument-btn.repi {
            color: #FF6347;
        }

        .instrument-btn.repi.selected {
            background: #FF6347;
            color: white;
        }

        .instrument-btn.snare {
            color: #4169E1;
        }

        .instrument-btn.snare.selected {
            background: #4169E1;
            color: white;
        }

        .playback-toggles {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 16px;
        }

        .playback-toggles-title {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
            text-align: center;
        }

        .playback-toggle-row {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .playback-toggle-btn {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: 2px solid;
            transition: all 0.2s;
        }

        .playback-toggle-btn.surdo1 {
            border-color: #8B4513;
            color: #8B4513;
            background: transparent;
        }

        .playback-toggle-btn.surdo1.active {
            background: #8B4513;
            color: white;
        }

        .playback-toggle-btn.surdo2 {
            border-color: #CD853F;
            color: #CD853F;
            background: transparent;
        }

        .playback-toggle-btn.surdo2.active {
            background: #CD853F;
            color: white;
        }

        .playback-toggle-btn.dobra {
            border-color: #FFD700;
            color: #FFD700;
            background: transparent;
        }

        .playback-toggle-btn.dobra.active {
            background: #FFD700;
            color: #000;
        }

        .playback-toggle-btn.repi {
            border-color: #FF6347;
            color: #FF6347;
            background: transparent;
        }

        .playback-toggle-btn.repi.active {
            background: #FF6347;
            color: white;
        }

        .playback-toggle-btn.snare {
            border-color: #4169E1;
            color: #4169E1;
            background: transparent;
        }

        .playback-toggle-btn.snare.active {
            background: #4169E1;
            color: white;
        }

        .playback-toggle-btn.click {
            border-color: #888;
            color: #888;
            background: transparent;
        }

        .playback-toggle-btn.click.active {
            background: #888;
            color: white;
        }

        .tap-record-container {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            align-items: stretch;
        }

        .tap-record-container.view-only {
            display: none;
        }

        .tap-record-area {
            background: #2a2a2a;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;

<body>
    <!-- Login Modal -->

        </div>
    </div>

    <!-- Song List View -->
    <div id="listView" class="view active">

            <div class="spacer"></div>

        <div class="song-list">

            <div id="songListContainer"></div>
        </div>

        </header>
        <div class="player-content">
            <div class="song-title" id="playerSongTitle"></div>

            <div class="song-bpm-control" id="songBpmControl">
                <button onclick="adjustSongBPM(-5)">-</button>
                <label>Song BPM:</label>
                <input type="number" id="songBpmInput" value="120" min="40" max="240" onchange="updateSongBPM()">
                <button onclick="adjustSongBPM(5)">+</button>
            </div>

            <div class="subsection-player-list" id="subsectionPlayerList"></div>
            <button class="action-btn" id="editBeatPatternsBtn" onclick="showEditor()" style="margin-top: 16px;">Edit Beat Patterns</button>

    <div id="editorView" class="view">

                    <button onclick="addSubsection()">Add</button>
                </div>

                <div class="current-subsection" id="currentSubsectionName"></div>

                <div class="grid-container" id="gridContainer"></div>

                    <div class="tap-record-area" id="tapRecordArea" onclick="handleTap()">

                </div>
            </div>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAtx5Vqjc95aG86VkGqWiJtaimXbon0_40",
            authDomain: "drum-practice-91b55.firebaseapp.com",
            databaseURL: "https://drum-practice-91b55-default-rtdb.firebaseio.com",
            projectId: "drum-practice-91b55",
            storageBucket: "drum-practice-91b55.firebasestorage.app",
            messagingSenderId: "409632465972",
            appId: "1:409632465972:web:011247a5a5607acb20d661"
        };

        // Initialize Firebase
        let database;
        try {
            firebase.initializeApp(firebaseConfig);

            console.error('Firebase initialization error:', error);

        let currentSong = { name: '', id: '' };
        let audioContext = null;
        let isPlaying = false;
        let savedPatterns = {}; // { songId: { measures, patterns: { instrumentId: [beat positions] } } }
        let activeTimeouts = [];
        let currentInstrument = null;
        let currentBeatIndex = -1;
        let lastPlayedBeatIndex = -1;
        let playbackInterval = null;
        let gridMeasures = 1; // number of measures
        let gridCols = 16; // sixteenth notes per measure
        let totalCells = 16; // total number of cells
        let isRecording = false;
        let autoPlayEnabled = false;
        let currentBPM = 120;
        let currentSubsection = null;
        let playingSubsection = null;
        let isViewOnlyMode = false;
        let activePlaybackInstruments = new Set(); // which instruments are currently playing
        let songList = []; // List of all songs
        let isAuthenticated = false;
        const PASSWORD = 'ineedicecreamtolive';

        const instruments = [
            { id: 'surdo1', name: 'Surdo 1', shortName: 'S1', frequency: 200, color: '#8B4513' },
            { id: 'surdo2', name: 'Surdo 2', shortName: 'S2', frequency: 300, color: '#CD853F' },
            { id: 'dobra', name: 'Dobra', shortName: 'D', frequency: 400, color: '#FFD700' },
            { id: 'repi', name: 'Repi', shortName: 'R', frequency: 600, color: '#FF6347' },
            { id: 'snare', name: 'Snare', shortName: 'SN', frequency: 1000, color: '#4169E1' }
        ];

        // Load saved data from Firebase
        function loadFromStorage() {
            if (!database) {
                console.error('Database not initialized');
                return;
            }

            try {
                // Load song list
                database.ref('songList').once('value').then((snapshot) => {
                    if (snapshot.exists()) {
                        songList = snapshot.val();
                        console.log('Loaded song list from Firebase');
                    } else {
                        // Initialize with default songs
                        songList = [
                            { name: 'Funky Coconuts', id: 'funky-coconuts' },
                            { name: 'Valencia', id: 'valencia' },
                            { name: 'Samba Reggae', id: 'samba-reggae' }
                        ];
                        saveSongList();
                    }
                    renderSongList();
                }).catch((error) => {
                    console.error('Error loading song list:', error);
                });

                // Load patterns
                database.ref('savedPatterns').once('value').then((snapshot) => {
                    if (snapshot.exists()) {
                        savedPatterns = snapshot.val();
                        console.log('Loaded patterns from Firebase');
                    }
                }).catch((error) => {
                    console.error('Error loading patterns:', error);
                });
            } catch (e) {
                console.error('Error loading from storage:', e);
            }
        }

        // Save to Firebase
        function saveToStorage() {
            if (!database) {
                console.error('Database not initialized');
                return;
            }

            try {
                database.ref('savedPatterns').set(savedPatterns).then(() => {
                    console.log('Saved patterns to Firebase');
                }).catch((error) => {
                    console.error('Error saving patterns:', error);
                    alert('Error saving data to cloud.');
                });
            } catch (e) {
                console.error('Error saving to storage:', e);
            }
        }

        function saveSongList() {
            if (!database) {
                console.error('Database not initialized');
                return;
            }

            try {
                database.ref('songList').set(songList).then(() => {
                    console.log('Saved song list to Firebase');
                }).catch((error) => {
                    console.error('Error saving song list:', error);
                });
            } catch (e) {
                console.error('Error saving song list:', e);
            }
        }

        // Authentication functions
        function toggleAuth() {
            if (isAuthenticated) {
                logout();
            } else {
                showLoginModal();
            }
        }

        function showLoginModal() {
            document.getElementById('loginModal').classList.remove('hidden');
            document.getElementById('passwordInput').focus();
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.add('hidden');
            document.getElementById('passwordInput').value = '';
            document.getElementById('loginError').classList.add('hidden');
        }

        function attemptLogin() {
            const input = document.getElementById('passwordInput');
            const password = input.value;

            if (password === PASSWORD) {
                isAuthenticated = true;
                sessionStorage.setItem('drumPracticeAuth', 'true');
                closeLoginModal();
                updateAuthUI();

                // Update UI based on current view
                const listView = document.getElementById('listView');
                if (listView && listView.classList.contains('active')) {
                    renderSongList();
                }

                const playerView = document.getElementById('playerView');
                if (playerView && playerView.classList.contains('active')) {
                    // Update player UI elements
                    const editBtn = document.getElementById('editBeatPatternsBtn');
                    if (editBtn) {
                        editBtn.classList.remove('hidden');
                    }
                    const bpmControl = document.getElementById('songBpmControl');
                    if (bpmControl) {
                        const buttons = bpmControl.querySelectorAll('button');
                        buttons.forEach(btn => btn.classList.remove('hidden'));
                    }
                    const songBpmInput = document.getElementById('songBpmInput');
                    if (songBpmInput) {
                        songBpmInput.readOnly = false;
                    }
                }

                const editorView = document.getElementById('editorView');
                if (editorView && editorView.classList.contains('active')) {
                    // If in view-only mode, show the edit button
                    if (isViewOnlyMode) {
                        const editModeBtn = document.querySelector('#viewControls button:last-child');
                        if (editModeBtn) {
                            editModeBtn.classList.remove('hidden');
                        }
                    } else {
                        // In edit mode, enable BPM controls
                        const bpmInput = document.getElementById('bpmInput');
                        if (bpmInput) {
                            bpmInput.readOnly = false;
                        }
                        const editorBpmControl = document.getElementById('editorBpmControl');
                        if (editorBpmControl) {
                            const buttons = editorBpmControl.querySelectorAll('button');
                            buttons.forEach(btn => btn.classList.remove('hidden'));
                        }
                    }
                }
            } else {
                const errorEl = document.getElementById('loginError');
                errorEl.textContent = 'Incorrect password';
                errorEl.classList.remove('hidden');
                input.value = '';
            }
        }

        function logout() {
            isAuthenticated = false;
            sessionStorage.removeItem('drumPracticeAuth');
            updateAuthUI();

            // If in editor view, go back to player or list view
            const editorView = document.getElementById('editorView');
            if (editorView && editorView.classList.contains('active')) {
                if (currentSong && currentSong.id) {
                    showView('player');
                } else {
                    showView('list');
                }
            }

            renderSongList();

            // Stop recording if active
            if (isRecording) {
                toggleRecord();
            }

            // Stop any playback
            if (isPlaying) {
                stopPlayback();
            }
            if (playingSubsection) {
                stopSubsectionPlay();
            }
        }

        function updateAuthUI() {
            const authBtns = ['authBtn', 'authBtnPlayer', 'authBtnEditor'];
            authBtns.forEach(btnId => {
                const btn = document.getElementById(btnId);
                if (btn) {
                    if (isAuthenticated) {
                        btn.textContent = 'Logout';
                        btn.classList.add('logout');
                    } else {
                        btn.textContent = 'Login';
                        btn.classList.remove('logout');
                    }
                }
            });
        }

        function checkAuth() {
            const auth = sessionStorage.getItem('drumPracticeAuth');
            isAuthenticated = auth === 'true';
            updateAuthUI();
        }

        // Load on page load
        window.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadFromStorage(); // This will call renderSongList when data is loaded

            // Allow Enter key to submit login
            document.getElementById('passwordInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    attemptLogin();
                }
            });

            // Close modal when clicking outside
            document.getElementById('loginModal').addEventListener('click', (e) => {
                if (e.target.id === 'loginModal') {
                    closeLoginModal();
                }
            });
        });

        // Initialize Audio Context
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Create a simple click sound
        function createClickSound(frequency = 1000, duration = 0.05, volume = 0.3) {
            initAudio();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = frequency;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(volume, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        // Create a completion sound (two tone beep)
        function playCompletionSound() {
            initAudio();

            // First beep
            const osc1 = audioContext.createOscillator();
            const gain1 = audioContext.createGain();
            osc1.connect(gain1);
            gain1.connect(audioContext.destination);
            osc1.frequency.value = 1200;
            osc1.type = 'sine';
            gain1.gain.setValueAtTime(0.3, audioContext.currentTime);
            gain1.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
            osc1.start(audioContext.currentTime);
            osc1.stop(audioContext.currentTime + 0.1);

            // Second beep (slightly higher)
            const osc2 = audioContext.createOscillator();
            const gain2 = audioContext.createGain();
            osc2.connect(gain2);
            gain2.connect(audioContext.destination);
            osc2.frequency.value = 1400;
            osc2.type = 'sine';
            gain2.gain.setValueAtTime(0.3, audioContext.currentTime + 0.15);
            gain2.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.25);
            osc2.start(audioContext.currentTime + 0.15);
            osc2.stop(audioContext.currentTime + 0.25);
        }

        function showView(viewName) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewName + 'View').classList.add('active');
            updateAuthUI();

            if (viewName === 'list') {
                renderSongList();
            }
        }

        function renderSongList() {
            const container = document.getElementById('songListContainer');
            container.innerHTML = '';

            // Show/hide add song section based on auth
            const addSongSection = document.querySelector('.add-song-section');
            if (addSongSection) {
                addSongSection.classList.toggle('hidden', !isAuthenticated);
            }

            songList.forEach(song => {
                const item = document.createElement('div');
                item.className = 'song-item';

                // Song header
                const header = document.createElement('div');
                header.className = 'song-item-header';

                const nameDiv = document.createElement('div');
                nameDiv.className = 'song-item-name';
                nameDiv.textContent = song.name;
                nameDiv.onclick = () => selectSong(song.name, song.id);

                header.appendChild(nameDiv);

                // Only show delete button if authenticated
                if (isAuthenticated) {
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'song-item-delete';
                    deleteBtn.textContent = 'Delete';
                    deleteBtn.onclick = (e) => {
                        e.stopPropagation();
                        deleteSong(song.id);
                    };
                    header.appendChild(deleteBtn);
                }

                item.appendChild(header);

                // Subsections list
                const songData = savedPatterns[song.id];
                if (songData && songData.subsections) {
                    const subsectionNames = Object.keys(songData.subsections);
                    if (subsectionNames.length > 0) {
                        const subList = document.createElement('div');
                        subList.className = 'subsection-list';

                        subsectionNames.forEach(subsectionName => {
                            const subItem = document.createElement('div');
                            subItem.className = 'subsection-list-item';

                            const subName = document.createElement('div');
                            subName.className = 'subsection-list-name';
                            subName.textContent = `• ${subsectionName}`;

                            const playBtn = document.createElement('button');
                            playBtn.className = 'subsection-play-btn';
                            playBtn.id = `list-play-${song.id}-${subsectionName.replace(/\s+/g, '-')}`;

                            // Check if this is currently playing
                            if (playingSubsection === subsectionName && currentSong.id === song.id && isPlaying) {
                                playBtn.textContent = 'Stop';
                                playBtn.classList.add('playing');
                            } else {
                                playBtn.textContent = 'Play';
                            }

                            playBtn.onclick = (e) => {
                                e.stopPropagation();
                                toggleSubsectionPlayFromList(song.id, song.name, subsectionName);
                            };

                            subItem.appendChild(subName);
                            subItem.appendChild(playBtn);
                            subList.appendChild(subItem);
                        });

                        item.appendChild(subList);
                    }
                }

                container.appendChild(item);
            });
        }

        function addSong() {
            if (!isAuthenticated) {
                alert('Please log in to add songs');
                return;
            }

            const input = document.getElementById('newSongName');
            const name = input.value.trim();

            if (!name) {
                alert('Please enter a song name');
                return;
            }

            // Create ID from name
            const id = name.toLowerCase().replace(/[^a-z0-9]+/g, '-');

            // Check if song already exists
            if (songList.find(s => s.id === id)) {
                alert('A song with that name already exists');
                return;
            }

            songList.push({ name, id });
            saveSongList();
            input.value = '';
            renderSongList();
        }

        function deleteSong(songId) {
            if (!isAuthenticated) {
                alert('Please log in to delete songs');
                return;
            }

            const song = songList.find(s => s.id === songId);
            if (!song) return;

            if (!confirm(`Delete "${song.name}" and all its subsections?`)) return;

            // Remove from song list
            songList = songList.filter(s => s.id !== songId);
            saveSongList();

            // Remove all saved patterns for this song
            delete savedPatterns[songId];
            saveToStorage();

            renderSongList();
        }

        function setupGrid() {
            if (!isAuthenticated) {
                alert('Please log in to create grids');
                return;
            }

            const measureCount = parseInt(document.getElementById('measureCount').value);
            if (measureCount < 1 || measureCount > 8) {
                alert('Please enter a number between 1 and 8');
                return;
            }

            if (!currentSubsection) {
                alert('Please select or add a subsection first');
                return;
            }

            isViewOnlyMode = false;
            gridMeasures = measureCount;
            gridCols = 16; // always 16 columns (16 sixteenth notes per measure)
            totalCells = gridMeasures * gridCols; // total sixteenth notes

            savedPatterns[currentSong.id].subsections[currentSubsection] = {
                measures: gridMeasures,
                patterns: {}
            };

            document.getElementById('beatSetup').style.display = 'none';
            document.getElementById('gridEditor').style.display = 'block';
            document.getElementById('currentSubsectionName').textContent = currentSubsection;

            // Show edit controls, hide view controls
            document.getElementById('instrumentButtons').style.display = 'flex';
            document.querySelector('.tap-record-container').style.display = 'flex';
            document.getElementById('editControls').style.display = 'flex';
            document.getElementById('viewControls').style.display = 'none';

            // Update tap area text and reset recording state
            const tapArea = document.getElementById('tapRecordArea');
            const recordToggleBtn = document.getElementById('recordToggleBtn');
            const recordIcon = document.getElementById('recordIcon');
            const stopIcon = document.getElementById('stopIcon');
            tapArea.classList.remove('recording', 'countdown');
            recordToggleBtn.classList.remove('recording', 'countdown');
            document.getElementById('tapAreaText').textContent = 'Select instrument & tap here';
            document.getElementById('recordStatus').classList.remove('active');
            recordIcon.style.display = 'block';
            stopIcon.style.display = 'none';
            isRecording = false;

            // Use song-level BPM
            currentBPM = savedPatterns[currentSong.id].bpm || 120;
            const bpmInput = document.getElementById('bpmInput');
            bpmInput.value = currentBPM;
            bpmInput.readOnly = !isAuthenticated;

                const buttons = editorBpmControl.querySelectorAll('button');
                buttons.forEach(btn => btn.classList.toggle('hidden', !isAuthenticated));
            }

            // Reset and initialize playback instruments
            activePlaybackInstruments.clear();
            initializePlaybackInstruments();
            renderInstrumentButtons();
            renderPlaybackToggles();
            renderGrid();
            updateClearButton();
            saveToStorage();

            // Auto-start playback
            startPlayback();
        }

        function renderInstrumentButtons() {
            const container = document.getElementById('instrumentButtons');
            container.innerHTML = '';

            instruments.forEach(instrument => {
                const btn = document.createElement('div');
                btn.className = 'instrument-btn ' + instrument.id;
                if (currentInstrument === instrument.id) {
                    btn.classList.add('selected');
                }
                btn.textContent = instrument.name;
                btn.onclick = () => selectInstrument(instrument.id);
                container.appendChild(btn);
            });

        function renderPlaybackToggles() {
            const container = document.getElementById('playbackToggleRow');
            container.innerHTML = '';

            // Add click track toggle first
            const clickBtn = document.createElement('div');
            clickBtn.className = 'playback-toggle-btn click';
            if (activePlaybackInstruments.has('click')) {
                clickBtn.classList.add('active');
            }
            clickBtn.textContent = 'Click';
            clickBtn.onclick = () => toggleInstrumentPlayback('click');
            container.appendChild(clickBtn);

            // Add all instrument toggles (show all instruments, not just ones with patterns)
            instruments.forEach(instrument => {
                const btn = document.createElement('div');
                btn.className = 'playback-toggle-btn ' + instrument.id;
                if (activePlaybackInstruments.has(instrument.id)) {
                    btn.classList.add('active');
                }
                btn.textContent = instrument.name;
                btn.onclick = () => toggleInstrumentPlayback(instrument.id);
                container.appendChild(btn);
            });

        function toggleInstrumentPlayback(instrumentId) {
            if (activePlaybackInstruments.has(instrumentId)) {
                activePlaybackInstruments.delete(instrumentId);
            } else {
                activePlaybackInstruments.add(instrumentId);
            }
            renderPlaybackToggles();
        }

        function initializePlaybackInstruments() {
            // Always enable click track
            if (!activePlaybackInstruments.has('click')) {
                activePlaybackInstruments.add('click');
            }

            // Enable any new instruments that have patterns
            const subsectionData = savedPatterns[currentSong.id].subsections[currentSubsection];
            instruments.forEach(instrument => {
                const pattern = subsectionData.patterns[instrument.id];
                if (pattern && pattern.length > 0) {
                    // Add instrument if it has patterns and isn't already in the set
                    if (!activePlaybackInstruments.has(instrument.id)) {
                        activePlaybackInstruments.add(instrument.id);
                    }
                }
            });
        }

        function selectInstrument(instrumentId) {
            currentInstrument = instrumentId;
            renderInstrumentButtons();

            const instrument = instruments.find(i => i.id === instrumentId);
            if (!isRecording) {
                document.getElementById('tapAreaText').textContent = `${instrument.name} - Tap here`;
            }

            // Update clear button text
            updateClearButton();
        }

        function updateClearButton() {
            const clearBtn = document.getElementById('clearBtn');
            if (currentInstrument) {
                const instrument = instruments.find(i => i.id === currentInstrument);
                clearBtn.textContent = `Clear ${instrument.name}`;
            } else {
                clearBtn.textContent = 'Clear All';
            }
        }

        function renderGrid() {
            const container = document.getElementById('gridContainer');
            container.innerHTML = '';

            const grid = document.createElement('div');
            grid.className = 'beat-grid';
            grid.style.gridTemplateColumns = `repeat(${gridCols}, 1fr)`;
            grid.style.gridTemplateRows = `repeat(${gridMeasures}, 1fr)`;

            for (let i = 0; i < totalCells; i++) {
                const cell = document.createElement('div');
                cell.className = 'beat-cell';
                cell.dataset.step = i;

                // Mark quarter note starts (every 4th sixteenth note within each measure)
                const posInMeasure = i % gridCols;
                if (posInMeasure % 4 === 0) {
                    cell.classList.add('quarter-start');
                }

                // Add dots for each instrument at this position
                const subsectionData = savedPatterns[currentSong.id].subsections[currentSubsection];
                instruments.forEach(instrument => {
                    const pattern = subsectionData.patterns[instrument.id];
                    if (pattern) {
                        const beat = pattern.find(b => b.step === i);
                        if (beat) {
                            const dot = document.createElement('div');
                            dot.className = 'instrument-dot ' + instrument.id;
                            if (beat.accent) {
                                dot.classList.add('accent');
                            }
                            dot.dataset.instrument = instrument.id;
                            cell.appendChild(dot);
                        }
                    }
                });

                // Only add edit handlers if not in view-only mode
                if (!isViewOnlyMode) {
                    // Add click handler to place/remove beats
                    cell.onclick = (e) => {
                        e.stopPropagation();
                        if (currentInstrument) {
                            toggleBeatAtPosition(i, false);
                        }
                    };

                    // Add double-click handler for accents
                    cell.ondblclick = (e) => {
                        e.stopPropagation();
                        if (currentInstrument) {
                            toggleBeatAtPosition(i, true);
                        }
                    };
                }

                grid.appendChild(cell);
            }

            container.appendChild(grid);
        }

        function toggleBeatAtPosition(stepIndex, forceAccent) {
            if (!isAuthenticated) {
                alert('Please log in to edit beats');
                return;
            }

            if (!currentInstrument) return;

            const subsectionData = savedPatterns[currentSong.id].subsections[currentSubsection];
            if (!subsectionData.patterns[currentInstrument]) {
                subsectionData.patterns[currentInstrument] = [];
            }

            const pattern = subsectionData.patterns[currentInstrument];
            const existingBeatIndex = pattern.findIndex(b => b.step === stepIndex);

            if (forceAccent) {
                // Double-click: add/toggle accent
                if (existingBeatIndex > -1) {
                    pattern[existingBeatIndex].accent = !pattern[existingBeatIndex].accent;
                } else {
                    pattern.push({ step: stepIndex, accent: true });
                    pattern.sort((a, b) => a.step - b.step);
                    // Enable playback for this instrument immediately
                    activePlaybackInstruments.add(currentInstrument);
                }
            } else {
                // Single-click: toggle beat existence
                if (existingBeatIndex > -1) {
                    pattern.splice(existingBeatIndex, 1);
                    // If pattern is now empty, optionally remove from playback
                    if (pattern.length === 0) {
                        activePlaybackInstruments.delete(currentInstrument);
                    }
                } else {
                    pattern.push({ step: stepIndex, accent: false });
                    pattern.sort((a, b) => a.step - b.step);
                    // Enable playback for this instrument immediately
                    activePlaybackInstruments.add(currentInstrument);
                }
            }

            renderGrid();
            renderPlaybackToggles();
            saveToStorage();
        }

        function toggleBeat(instrumentId, stepIndex) {
            const songData = savedPatterns[currentSong.id];
            if (!songData.patterns[instrumentId]) {
                songData.patterns[instrumentId] = [];
            }

            const pattern = songData.patterns[instrumentId];
            const index = pattern.indexOf(stepIndex);

            if (index > -1) {
                pattern.splice(index, 1);
            } else {
                pattern.push(stepIndex);
                pattern.sort((a, b) => a - b);
            }

            renderGrid();
        }

        function toggleRecordButton() {
            if (isRecording) {
                // Stop recording
                stopRecording();
            } else {
                // Start recording with countdown
                startRecording();
            }
        }

        function startRecording() {
            if (!isAuthenticated) {
                alert('Please log in to record');
                return;
            }

            if (!currentInstrument) {
                alert('Please select an instrument first!');
                return;
            }

            const tapArea = document.getElementById('tapRecordArea');
            const recordToggleBtn = document.getElementById('recordToggleBtn');
            const recordStatus = document.getElementById('recordStatus');
            const tapText = document.getElementById('tapAreaText');
            const recordIcon = document.getElementById('recordIcon');
            const stopIcon = document.getElementById('stopIcon');

            // Stop current playback
            if (isPlaying) {
                stopPlayback();
            }

            // Add countdown class
            tapArea.classList.add('countdown');
            recordToggleBtn.classList.add('countdown');
            recordIcon.style.display = 'none';

            // Calculate beat duration based on BPM (quarter note)
            const beatDuration = 60000 / currentBPM;

            // Countdown: 4, 3, 2, 1 then start immediately
            let count = 4;
            tapText.textContent = count.toString();
            createClickSound(1200, 0.05, 0.4); // Countdown beep

            const countdownInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    tapText.textContent = count.toString();
                    createClickSound(1200, 0.05, 0.4); // Countdown beep
                } else {
                    clearInterval(countdownInterval);

                    // Start recording immediately after "1" beep
                    isRecording = true;
                    tapArea.classList.remove('countdown');
                    tapArea.classList.add('recording');
                    recordToggleBtn.classList.remove('countdown');
                    recordToggleBtn.classList.add('recording');
                    recordStatus.classList.add('active');
                    tapText.textContent = 'TAP';
                    stopIcon.style.display = 'block';

                    // Start playback from the beginning
                    startPlayback();
                }
            }, beatDuration); // Use BPM-based timing
        }

        function stopRecording() {
            isRecording = false;

            const tapArea = document.getElementById('tapRecordArea');
            const recordToggleBtn = document.getElementById('recordToggleBtn');
            const recordStatus = document.getElementById('recordStatus');
            const tapText = document.getElementById('tapAreaText');
            const recordIcon = document.getElementById('recordIcon');
            const stopIcon = document.getElementById('stopIcon');

            tapArea.classList.remove('recording');
            tapArea.classList.remove('countdown');
            recordToggleBtn.classList.remove('recording');
            recordToggleBtn.classList.remove('countdown');
            recordStatus.classList.remove('active');
            recordIcon.style.display = 'block';
            stopIcon.style.display = 'none';

            if (currentInstrument) {
                const instrument = instruments.find(i => i.id === currentInstrument);
                tapText.textContent = `${instrument.name} - Tap here`;
            } else {
                tapText.textContent = 'Select instrument & tap here';
            }
        }

        function handleTap() {
            if (!isRecording || !currentInstrument || lastPlayedBeatIndex < 0) {
                return;
            }

            // Add beat at the last played position (the beat the user is hearing)
            const subsectionData = savedPatterns[currentSong.id].subsections[currentSubsection];
            if (!subsectionData.patterns[currentInstrument]) {
                subsectionData.patterns[currentInstrument] = [];
            }

            const pattern = subsectionData.patterns[currentInstrument];
            const existingBeatIndex = pattern.findIndex(b => b.step === lastPlayedBeatIndex);

            if (existingBeatIndex > -1) {
                // Remove if already exists
                pattern.splice(existingBeatIndex, 1);
                // If pattern is now empty, optionally remove from playback
                if (pattern.length === 0) {
                    activePlaybackInstruments.delete(currentInstrument);
                }
            } else {
                // Add if doesn't exist
                pattern.push({ step: lastPlayedBeatIndex, accent: false });
                pattern.sort((a, b) => a.step - b.step);
                // Enable playback for this instrument immediately
                activePlaybackInstruments.add(currentInstrument);
            }

            renderGrid();
            renderPlaybackToggles();
            saveToStorage();
        }

        function clearInstruments() {
            if (!isAuthenticated) {
                alert('Please log in to clear instruments');
                return;
            }

            const subsectionData = savedPatterns[currentSong.id].subsections[currentSubsection];

            if (currentInstrument) {
                // Clear only the selected instrument
                const instrument = instruments.find(i => i.id === currentInstrument);
                if (confirm(`Clear all ${instrument.name} beats in this subsection?`)) {
                    delete subsectionData.patterns[currentInstrument];
                    // Remove from active playback
                    activePlaybackInstruments.delete(currentInstrument);
                    renderGrid();
                    renderPlaybackToggles();
                    saveToStorage();

                    // Restart the loop from the beginning
                    if (isPlaying) {
                        stopPlayback();
                        startPlayback();
                    }
                }
            } else {
                // Clear all instruments
                if (confirm('Clear all instruments in this subsection?')) {
                    subsectionData.patterns = {};
                    // Remove all instruments from active playback (keep click track)
                    instruments.forEach(inst => activePlaybackInstruments.delete(inst.id));
                    renderGrid();
                    renderPlaybackToggles();
                    saveToStorage();

                    // Restart the loop from the beginning
                    if (isPlaying) {
                        stopPlayback();
                        startPlayback();
                    }
                }
            }
        }

        function selectSong(name, id) {

        function renderSubsectionPlayerList() {
            const list = document.getElementById('subsectionPlayerList');
            list.innerHTML = '';

            const songData = savedPatterns[currentSong.id];
            const subsections = songData?.subsections || {};
            const subsectionNames = Object.keys(subsections);

                const noSubsections = document.createElement('div');
                noSubsections.className = 'no-subsections';
                noSubsections.textContent = 'No subsections recorded yet. Click "Edit Beat Patterns" to create one.';
                list.appendChild(noSubsections);

                playBtn.textContent = '▶ Play';
                playBtn.onclick = () => toggleSubsectionPlay(subsectionName);

                controls.appendChild(playBtn);
                item.appendChild(nameSpan);
                item.appendChild(controls);
                list.appendChild(item);

        function toggleSubsectionPlay(subsectionName) {
            if (playingSubsection === subsectionName && isPlaying) {
                stopSubsectionPlay();
            } else {
                playSubsection(subsectionName);
            }
        }

        function toggleSubsectionPlayFromList(songId, songName, subsectionName) {
            if (playingSubsection === subsectionName && currentSong.id === songId && isPlaying) {
                stopSubsectionPlay();
            } else {
                playSubsectionFromList(songId, songName, subsectionName);
            }

        function playSubsectionFromList(songId, songName, subsectionName) {
            // Stop any currently playing subsection
            if (isPlaying) {
                stopSubsectionPlay();
            }

            // Set current song
            currentSong = { name: songName, id: songId };
            playingSubsection = subsectionName;
            currentSubsection = subsectionName;

            const subsectionData = savedPatterns[songId].subsections[subsectionName];
            gridMeasures = subsectionData.measures;
            gridCols = 16;
            totalCells = gridMeasures * gridCols;

            // Use song-level BPM
            currentBPM = savedPatterns[songId].bpm || 120;

            // Reset and initialize playback instruments for this subsection
            activePlaybackInstruments.clear();
            activePlaybackInstruments.add('click');
            instruments.forEach(instrument => {
                const pattern = subsectionData.patterns[instrument.id];
                if (pattern && pattern.length > 0) {
                    activePlaybackInstruments.add(instrument.id);
                }
            });

            const playBtn = document.getElementById(`list-play-${songId}-${subsectionName.replace(/\s+/g, '-')}`);
            playBtn.textContent = 'Stop';

        function playSubsection(subsectionName) {

            if (isPlaying) {
                stopSubsectionPlay();

            playingSubsection = subsectionName;
            currentSubsection = subsectionName;

            const subsectionData = savedPatterns[currentSong.id].subsections[subsectionName];
            gridMeasures = subsectionData.measures;
            gridCols = 16;
            totalCells = gridMeasures * gridCols;

            // Use song-level BPM
            currentBPM = savedPatterns[currentSong.id].bpm || 120;

            // Reset and initialize playback instruments for this subsection
            activePlaybackInstruments.clear();
            activePlaybackInstruments.add('click');

                const pattern = subsectionData.patterns[instrument.id];
                if (pattern && pattern.length > 0) {
                    activePlaybackInstruments.add(instrument.id);
                }
            });

            const playBtn = document.getElementById(`play-${subsectionName}`);
            playBtn.textContent = '⏸ Stop';

        function stopSubsectionPlay() {
            if (playingSubsection && currentSong) {

                    listPlayBtn.classList.remove('playing');

            playingSubsection = null;
